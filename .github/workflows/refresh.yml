name: Refresh snapshot

# Pricing rule (per fund design):
#   - Pre-market   → snapshot keeps prior day's close
#   - 9:30 AM–4 PM → snapshot updates with live intraday quotes
#   - After 4 PM   → snapshot locks at today's official close
#
# Cron windows reflect that policy. GitHub schedules are UTC and do NOT
# auto-adjust for daylight savings, so windows are widened by an hour on
# each side so EST and EDT are both covered. Schedules can be delayed
# by minutes during load spikes (esp. at :00 of each hour), which is
# why minute offsets start at :05.
on:
  schedule:
    # Single cron every 10 minutes, 24/7.
    #
    # Previously had two cron entries (every-5 during trading + every-15
    # always). GitHub's scheduler appeared to honor only one of them and
    # drop the other — only ~2 runs/day were firing instead of the
    # expected ~144. Consolidating to one simple cron entry significantly
    # improves the chance GitHub's scheduler actually fires it.
    #
    # Note: GitHub's scheduled workflows are documented as best-effort and
    # can be delayed by minutes during load spikes. For hard-real-time
    # reliability, point an external scheduler (cron-job.org / UptimeRobot
    # / Cloudflare Cron Trigger) at the workflow_dispatch endpoint of this
    # workflow.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

# Avoid stacking up if a previous run is still in flight.
concurrency:
  group: refresh-snapshot
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run pipeline
        run: python -m pipeline.run
      - name: Commit snapshot (only if changed)
        run: |
          git config user.name "convex-bot"
          git config user.email "convex-bot@users.noreply.github.com"
          git add docs/data/snapshot.json
          if ! git diff --cached --quiet; then
            git commit -m "snapshot: $(date -u +'%Y-%m-%d %H:%MZ')"
            # Rebase in case another run pushed while we were working
            git pull --rebase --autostash
            git push
          else
            echo "Snapshot unchanged — skipping commit."
          fi
